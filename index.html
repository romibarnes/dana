<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #e9e5dd;
    font-family: 'Assistant', system-ui, sans-serif;
    color: #2a221d;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 12px;
  }

  /* Mobile-frame — desktop preview only. On phones we go fullbleed. */
  .mf-shell {
    width: 390px;
    max-width: 100%;
    border-radius: 38px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 60px -20px rgba(40,30,25,0.18), 0 0 0 1px rgba(0,0,0,0.07);
    background: #fff;
  }
  .mf-statusbar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 26px;
    font: 600 14px/1 -apple-system, system-ui;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 50;
    pointer-events: none;
  }
  .mf-statusbar.dark { color: #fff; }
  .mf-statusbar.light { color: #2a221d; }
  .mf-statusbar .icons { display: flex; gap: 5px; align-items: center; }
  .mf-statusbar .icons svg { width: 16px; height: 11px; }
  .mf-notch {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 32px;
    border-radius: 20px;
    background: #1a1410;
    z-index: 60;
    pointer-events: none;
  }
  .mf-bottom-bar { height: 18px; display: flex; align-items: center; justify-content: center; }
  .mf-bottom-bar::after {
    content: '';
    width: 130px; height: 4px; border-radius: 2px;
    background: rgba(0,0,0,0.25);
  }

  /* On real phones — drop the bezel chrome and fill the screen. */
  @media (max-width: 480px) {
    body { padding: 0; background: #fbf6ef; }
    .mf-shell { width: 100%; border-radius: 0; box-shadow: none; }
    .mf-statusbar, .mf-notch, .mf-bottom-bar { display: none; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
